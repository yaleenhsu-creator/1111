<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>履歷表</title>

<style>
body {
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    background: #eef1f5;
}

/* 外框 */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 主卡片 */
.card {
    display: flex;
    width: 700px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 左側 */
.left {
    width: 40%;
    background: linear-gradient(135deg, #ff7e7e, #ffb199);
    color: white;
    text-align: center;
    padding: 30px 20px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-bottom: 15px;
}

.left h1 {
    margin: 10px 0;
}

/* 右側 */
.right {
    width: 60%;
    background: white;
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.info {
    margin: 8px 0;
    color: #444;
    font-size: 16px;
}

/* 按鈕 */
button {
    margin-top: 20px;
    padding: 10px;
    border: none;
    background: #6c63ff;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #574fd6;
    transform: scale(1.05);
}
</style>

</head>
<body>

<div class="container">
    <div class="card">

        <!-- 左側 -->
        <div class="left">
            <img src="images/photo.jpg" alt="個人照片" class="profile-img">
            <h1 id="name">許某某</h1>
        </div>

        <!-- 右側 -->
        <div class="right">
            <p class="info">亞洲大學學生</p>
            <p class="info">學號：AU114018016</p>
            <p class="info">Email：yaleen.hsu@gmail.com</p>

            <button onclick="showMessage()">點我</button>
        </div>

    </div>
</div>

<script>
function showMessage() {
    alert("你好！這是許某某的履歷表！");
}
</script>

</body>
</html>
