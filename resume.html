<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>履歷表</title>

<style>
body {
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    background: #eef1f5;
}

.container {
    display: flex;
    justify-content: center;
    padding: 30px;
}

/* 卡片 */
.card {
    display: flex;
    width: 900px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 左側 */
.left {
    width: 30%;
    background: linear-gradient(135deg, #ff7e7e, #ffb199);
    color: white;
    text-align: center;
    padding: 25px 15px;
}

.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

.left h1 {
    margin: 10px 0;
}

.section-title {
    margin-top: 20px;
    font-weight: bold;
}

.small-text {
    font-size: 14px;
    margin: 5px 0;
}

/* 右側 */
.right {
    width: 70%;
    background: white;
    padding: 25px;
}

.block {
    margin-bottom: 18px;
}

.block h3 {
    margin-bottom: 6px;
    color: #6c63ff;
}

.info {
    font-size: 15px;
    color: #444;
    margin: 4px 0;
}

/* 技能條 */
.skill-bar {
    height: 8px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin: 5px 0 10px;
}

.skill-bar div {
    height: 100%;
    background: #6c63ff;
}

/* 按鈕 */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #6c63ff;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #574fd6;
}
</style>

</head>
<body>

<div class="container">
    <div class="card">

        <!-- 左 -->
        <div class="left">
            <img src="images/photo.jpg" class="profile-img">

          
            <h1>許某某</h1>
            <audio id="bgm" autoplay loop playsinline>
  <source src="music.mp3" type="audio/mpeg">
</audio>
  <script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>

            <div class="section-title">聯絡資訊</div>
            <div class="small-text">亞洲大學學生</div>
            <div class="small-text">學號：AU114018016</div>
            <div class="small-text">yaleen.hsu@gmail.com</div>

            <div class="section-title">興趣</div>
            <div class="small-text">音樂 / 藝術 / 運動</div>

            <div class="section-title">個人特質</div>
            <div class="small-text">✔ 負責任</div>
            <div class="small-text">✔ 細心</div>
            <div class="small-text">✔ 善於溝通</div>
        </div>

        <!-- 右 -->
        <div class="right">

            <div class="block">
                <h3>自我介紹</h3>
                <p class="info">
                    我是亞洲大學的學生，積極學習專業知識並培養實務能力，
                    個性主動認真，擅長與人合作與溝通，期望未來能在相關領域發展。
                </p>
            </div>

            <div class="block">
                <h3>教育背景</h3>
                <p class="info">亞洲大學（就讀中）</p>
            </div>

            <div class="block">
                <h3>經歷 / 活動</h3>
                <p class="info">• 參與校內課程專題製作</p>
                <p class="info">• 小組報告與團隊合作經驗</p>
            </div>

            <div class="block">
                <h3>技能</h3>
                HTML / CSS
                <div class="skill-bar"><div style="width: 75%"></div></div>

                溝通能力
                <div class="skill-bar"><div style="width: 85%"></div></div>

                團隊合作
                <div class="skill-bar"><div style="width: 80%"></div></div>
            </div>

            <div class="block">
                <h3>證照 / 成果</h3>
                <p class="info">（可填寫未來考取證照）</p>
            </div>

            <button onclick="showMessage()">點我</button>

        </div>

    </div>
</div>

<script>
function showMessage() {
    alert("你好！這是許某某的履歷表！");
}
</script>


</body>
</html>
